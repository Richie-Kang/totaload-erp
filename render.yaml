# Render Blueprint — frontend + backend + ocr-service. All services on the free plan.
# Database lives elsewhere (Supabase / Neon) so we don't get bitten by Render's 30-day
# free Postgres expiry; file bytes live in the DB (no persistent disk required).
#
# Render dashboard -> New -> Blueprint -> pick this repo -> Apply.
# After the first deploy, set:
#   - totaload-backend.DATABASE_URL  (Supabase / Neon connection string, sslmode=require)
#   - totaload-ocr.CODEX_AUTH_JSON   (contents of your local ~/.codex/auth.json)
# See README.md for the full procedure.
#
# Cross-service URLs below assume Render's default *.onrender.com hostnames derived
# from the service names. If Render appends a suffix (name collision), update
# OCR_SERVICE_URL / CORS_ORIGIN / BACKEND_URL in the dashboard.
#
# Free-plan trade-off: services sleep after ~15 minutes idle; the first request after
# sleep takes ~30–60s (cold start). Acceptable for occasional internal use.

services:
  - type: web
    name: totaload-ocr
    runtime: docker
    dockerfilePath: ./Dockerfile.ocr
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: TEMPLATE_PATH
        value: /app/assets/malso_application_template.pdf
      # The contents of a ChatGPT ~/.codex/auth.json — set manually in the dashboard.
      - key: CODEX_AUTH_JSON
        sync: false

  - type: web
    name: totaload-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 4000
      # External Postgres (Supabase / Neon). Paste the connection string in the dashboard.
      - key: DATABASE_URL
        sync: false
      - key: OCR_SERVICE_URL
        value: https://totaload-ocr.onrender.com
      - key: CORS_ORIGIN
        value: https://totaload-frontend.onrender.com

  - type: web
    name: totaload-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 80
      - key: BACKEND_URL
        value: https://totaload-backend.onrender.com
