# Render Blueprint — frontend + backend + ocr-service + managed Postgres.
# Render dashboard -> New -> Blueprint -> pick this repo -> Apply.
# After the first deploy, set the ocr service's CODEX_AUTH_JSON env var (see README).
#
# Cross-service URLs below assume Render's default *.onrender.com hostnames derived
# from the service names. If Render appends a suffix (name collision), update the
# OCR_SERVICE_URL / CORS_ORIGIN / BACKEND_URL env vars in the dashboard.

services:
  - type: web
    name: totaload-ocr
    runtime: docker
    dockerfilePath: ./Dockerfile.ocr
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: TEMPLATE_PATH
        value: /app/assets/malso_application_template.pdf
      # The contents of a ChatGPT ~/.codex/auth.json — set manually in the dashboard.
      - key: CODEX_AUTH_JSON
        sync: false

  - type: web
    name: totaload-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    plan: starter            # required: free-plan services cannot mount a disk
    healthCheckPath: /api/health
    disk:
      name: storage
      mountPath: /data/storage
      sizeGB: 1
    envVars:
      - key: PORT
        value: 4000
      - key: STORAGE_DIR
        value: /data/storage
      - key: DATABASE_URL
        fromDatabase:
          name: totaload-db
          property: connectionString
      - key: OCR_SERVICE_URL
        value: https://totaload-ocr.onrender.com
      - key: CORS_ORIGIN
        value: https://totaload-frontend.onrender.com

  - type: web
    name: totaload-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 80
      - key: BACKEND_URL
        value: https://totaload-backend.onrender.com

databases:
  - name: totaload-db
    databaseName: totaload
    user: totaload
    plan: free               # NOTE: free Postgres on Render is deleted after 30 days
